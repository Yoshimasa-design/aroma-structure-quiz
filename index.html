<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#173b5e"><title>香気成分クイズ</title><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="style.css"></head>
<body><header><div><small>AROMA CHEMISTRY</small><h1>香気成分クイズ</h1><p>香りと構造式を結びつけて覚えよう</p></div><button id="statsBtn">学習記録</button></header>
<main>
<section id="home" class="screen active">
<div class="hero"><div><b>20成分収録</b><h2>今日のトレーニング</h2><p>10問に挑戦し、間違えた成分を復習します。</p></div><div id="ring"><strong id="mastery">0%</strong><span>習得率</span></div></div>
<div class="modes">
<button data-mode="structure"><i>⌬</i><span><strong>構造式クイズ</strong><small>成分名から構造式を選ぶ</small></span></button>
<button data-mode="odor"><i>◌</i><span><strong>香り当てクイズ</strong><small>香りから成分名を選ぶ</small></span></button>
<button data-mode="review"><i>↻</i><span><strong>苦手を復習</strong><small id="reviewN">復習対象 0成分</small></span></button>
<button id="libraryBtn"><i>▦</i><span><strong>香気成分図鑑</strong><small>構造・香り・分類を確認</small></span></button>
</div><aside><strong>学習上の注意</strong><p>香りの表現は代表的・簡略化したものです。香りは濃度、異性体、共存成分などによって変化します。</p></aside>
</section>
<section id="quiz" class="screen">
<div class="top"><button id="quit">終了</button><div class="bar"><span id="bar"></span></div><em id="counter"></em></div>
<article class="question"><small id="qtype"></small><h2 id="qtext"></h2><p id="hint"></p><div id="choices"></div></article>
<section id="feedback" class="feedback hidden"><div class="fbhead"><b id="mark"></b><div><p id="flabel"></p><h3 id="ftitle"></h3></div></div>
<div class="fbbody"><img id="fimg"><dl><div><dt>香り</dt><dd id="fodor"></dd></div><div><dt>主な由来</dt><dd id="fsrc"></dd></div><div><dt>分類</dt><dd id="fcat"></dd></div><div><dt>構造のポイント</dt><dd id="ffeat"></dd></div></dl></div>
<button id="next">次の問題</button></section></section>
<section id="result" class="screen"><article class="result"><small>RESULT</small><h2>トレーニング完了</h2><div class="score"><strong id="score">0</strong><span>/ 10</span></div><p id="resultMsg"></p><div id="missed"></div><div class="actions"><button id="retry">もう一度</button><button id="homeBtn">ホームへ</button></div></article></section>
<section id="library" class="screen"><div class="sectionHead"><button id="libBack">戻る</button><div><small>LIBRARY</small><h2>香気成分図鑑</h2></div></div>
<div class="filters"><input id="search" type="search" placeholder="成分名・香り・食品で検索"><select id="cat"><option value="">すべての分類</option></select></div><div id="cards"></div></section>
<section id="stats" class="screen"><div class="sectionHead"><button id="statsBack">戻る</button><div><small>LEARNING RECORD</small><h2>学習記録</h2></div></div>
<div class="statSummary"><article><strong id="total">0</strong><span>総回答数</span></article><article><strong id="accuracy">0%</strong><span>正答率</span></article><article><strong id="mastered">0</strong><span>習得成分</span></article></div>
<h3>成分別の習得状況</h3><div id="statRows"></div><button id="reset">学習記録をリセット</button></section>
</main><footer>東京農業大学・講義教材用試作版</footer><script src="app.js"></script></body></html>
