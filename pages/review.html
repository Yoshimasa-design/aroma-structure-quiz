<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>復習モード</title><link rel="stylesheet" href="../css/common.css"><link rel="stylesheet" href="../css/review.css"></head><body><header class="site-header"><div class="container header-inner"><a class="brand" href="../index.html">香りから化学を学ぼう<small>Aroma Chemistry Learning</small></a><nav><a href="../index.html">トップ</a><a href="learn.html">香りから学ぶ</a><a href="odor-quiz.html">香りクイズ</a><a href="structure-quiz.html">構造式クイズ</a><a class="active" href="review.html">復習</a><a href="encyclopedia.html">図鑑</a><a href="progress.html">学習記録</a></nav></div></header><main class="section"><div class="container review-wrap"><a class="back" href="../index.html">← トップへ</a><section id="setup"><h1>復習モード</h1><p class="lead">学習記録やお気に入りから、復習する成分を選びます。</p><div class="review-options"><button class="review-option" data-source="favorites"><span>★</span><strong>お気に入りから復習</strong><small id="favoriteCount">0成分</small></button><button class="review-option" data-source="incorrect"><span>↺</span><strong>間違えた問題を復習</strong><small id="incorrectCount">0成分</small></button><button class="review-option" data-source="weak"><span>📉</span><strong>苦手な問題を復習</strong><small id="weakCount">0成分</small></button><button class="review-option" data-source="all"><span>🔀</span><strong>すべてからランダム復習</strong><small id="allCount">0成分</small></button></div><div class="review-settings"><label>問題形式<select id="mode"><option value="mixed">香り・構造式を混ぜる</option><option value="odor">香りから成分名</option><option value="structure">成分名から構造式</option></select></label><label>出題数<select id="limit"><option value="5">5問</option><option value="10" selected>10問</option><option value="20">20問</option></select></label></div><p id="setupMessage" class="notice hidden"></p></section><section id="quiz" class="quiz-card hidden"><div class="stage-line"><b id="quizTitle">復習</b><span id="count"></span></div><div class="progress"><span id="bar"></span></div><div class="question"><h1 id="question"></h1></div><div class="choices" id="choices"></div><section class="result hidden" id="result"></section></section></div></main><script type="module" src="../js/review.js"></script></body></html>
